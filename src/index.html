<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>昀 - 个人主页</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/chat.css">
</head>
<body>
    <main>
        <header>
            <div class="avatar">🌸</div>
            <h1>昀</h1>
            <p class="tagline">正在学各种各样东西的（？）</p>
        </header>

        <div class="container">
            <section id="about" class="left-panel">
                <h2>关于我</h2>
                <div class="info-card">
                    <h3>现在在做</h3>
                    <p>是的如你所见我在学做这个东西</p>
                </div>
                <div class="info-card">
                    <h3>我的兴趣</h3>
                    <p>看书、画画、听歌、现在还有这个（学ai？）</p>
                </div>
                <div class="info-card">
                    <h3>我的特点</h3>
                    <p>嗯非常跳脱ovo</p>
                </div>
            </section>

            <aside id="chat" class="right-panel">
                <h2>数字分身</h2>
                <div id="chat-window">
                    <div id="messages"></div>
                    <div class="chat-input-group">
                        <input type="text" id="message-input" placeholder="你是谁？">
                        <button id="send-button">→</button>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <footer>
        <p>✨ 欢迎来访 ✨</p>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
